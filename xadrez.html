                        let animRemovedClasses = [];
                        
                        switch(piece.type) {
                            case 'pawn': 
                                animClass = 'anim-soco-3d'; 
                                animRemovedClasses = ['anim-soco-3d'];
                                createParticleEffect(fromRow, fromCol, 'punch', piece.color);
                                break;
                            case 'rook': 
                                animClass = 'anim-tiro-cannon'; 
                                animRemovedClasses = ['anim-tiro-cannon'];
                                createParticleEffect(fromRow, fromCol, 'cannon', piece.color);
                                break;
                            case 'bishop': 
                                animClass = 'anim-exorcismo-celestial'; 
                                animRemovedClasses = ['anim-exorcismo-celestial'];
                                createParticleEffect(toRow, toCol, 'exorcism', piece.color);
                                break;
                            case 'knight': 
                                animClass = 'anim-cavalo-coice'; 
                                animRemovedClasses = ['anim-cavalo-coice'];
                                createParticleEffect(fromRow, fromCol, 'stomp', piece.color);
                                break;
                            case 'queen': 
                                animClass = 'anim-rainha-elegante'; 
                                animRemovedClasses = ['anim-rainha-elegante', 'rainha-trail'];
                                createParticleEffect(fromRow, fromCol, 'slash', piece.color);
                                fromSquare.classList.add('rainha-trail');
                                break;
                            case 'king': 
                                animClass = 'anim-rei-shockwave';
                                animRemovedClasses = ['anim-rei-shockwave'];
                                createParticleEffect(toRow, toCol, 'shockwave', piece.color);
                                if (toSquare) {
                                    // Aplicar empurrão espiral na peça capturada (para o Rei)
                                    toSquare.classList.add('empurrado-espiral');
                                }
                                // Criar efeito de onda de choque visual
                                createShockwaveEffect(toRow, toCol);
                                break;
                        }
                        
                        if (animClass && fromSquare) {
                            fromSquare.classList.add(animClass);
                        }
                    }, 40);
                }
                
                // Aplicar animação 3D de desaparecimento na peça capturada
                if (toSquare) {
                    setTimeout(() => {
                        toSquare.classList.add('captured-3d');
                    }, 80);
                }
                
                // Remover classes de animação e peça capturada após a conclusão
                setTimeout(() => {
                    if (toSquare) {
                        toSquare.classList.remove('captured-3d', 'tremulo-3d', 'empurrado-espiral');
                        // Remover elemento DOM após animação
                        toSquare.innerHTML = '';
                    }
                    if (fromSquare) {
                        fromSquare.classList.remove(
                            'anim-soco-3d', 'anim-tiro-cannon', 'anim-exorcismo-celestial', 
                            'anim-cavalo-coice', 'anim-rainha-elegante', 'rainha-trail', 'anim-rei-shockwave'
                        );
                    }
                }, 650);
            } else {
                // playSound(piece.type); // Som removido
            }

            // Switch player first, then emit
            const nextPlayer = playerWhoMoved === 'white' ? 'black' : 'white';
            currentPlayer = nextPlayer;

            if (gameMode === 'online' && socket) {
                // BUG FIX #4: isMyTurn BEFORE emit to prevent race condition
                isMyTurn = false;
                currentPlayer = nextPlayer;
                console.log('Emitting move, movedBy:', playerWhoMoved, 'next:', nextPlayer);
                socket.emit('makeMove', {
                    board: board,
                    currentPlayer: nextPlayer
                });
                createBoard();
                // updateTurnIndicator(); // Removido: Indicador de turno desabilitado
                checkGameStatus();
            } else {
                createBoard();
                // BUG FIX #2: switchPlayer handles local mode; AI is triggered only in local mode
                switchPlayer();
            }
        }

        function switchPlayer() {
             // currentPlayer already updated in movePiece before this call
             // updateTurnIndicator() - função foi desabilitada
             
             // BUG FIX #2: Only trigger AI in local mode when it's black's turn
             if (gameMode === 'local' && currentPlayer === 'black' && gameActive) {
                 setTimeout(() => makeAIMove(), 500);
             }
             
             checkGameStatus();
         }

        const pieceValues = {
            pawn: 100,
            knight: 320,
            bishop: 330,
            rook: 500,
            queen: 900,
            king: 20000
        };

        let learnedPieceValues = {...pieceValues};
        let gamesPlayed = 0;
        let gamesWon = 0;
        let gamesLost = 0;
        let openingLibrary = {};
        let recentGames = [];

        function loadLearnedData() {
            try {
                const saved = localStorage.getItem('chessAI_data');
                if (saved) {
                    const data = JSON.parse(saved);
                    learnedPieceValues = data.pieceValues || {...pieceValues};
                    gamesPlayed = data.gamesPlayed || 0;
                    gamesWon = data.gamesWon || 0;
                    gamesLost = data.gamesLost || 0;
                    openingLibrary = data.openingLibrary || {};
                    recentGames = data.recentGames || [];
                    console.log('Loaded learned data - Games:', gamesPlayed, 'Wins:', gamesWon);
                }
            } catch(e) {
                console.log('Could not load learned data:', e);
            }
        }

        function saveLearnedData() {
            try {
                const data = {
                    pieceValues: learnedPieceValues,
                    gamesPlayed: gamesPlayed,
                    gamesWon: gamesWon,
                    gamesLost: gamesLost,
                    openingLibrary: openingLibrary,
                    recentGames: recentGames.slice(-100)
                };
                localStorage.setItem('chessAI_data', JSON.stringify(data));
            } catch(e) {
                console.log('Could not save learned data:', e);
            }
        }

        function getOpeningSignature(moves, maxMoves = 4) {
            const firstMoves = moves.slice(0, maxMoves).map(m => {
                if (typeof m === 'string') return m;
                if (!m || !m.from || !m.to) return '';
                return m.from.join('') + m.to.join('');
            }).filter(s => s);
            return firstMoves.join('-');
        }

        function recordOpening(color, moves, result) {
            const maxMoves = 4;
            if (moves.length < maxMoves) return;
            
            const signature = getOpeningSignature(moves);
            const colorKey = color;
            
            if (!openingLibrary[signature]) {
                openingLibrary[signature] = {
                    timesPlayed: 0,
                    wins: 0,
                    losses: 0,
                    draws: 0,
                    color: colorKey
                };
            }
            
            openingLibrary[signature].timesPlayed++;
            if (result === 'win') openingLibrary[signature].wins++;
            else if (result === 'loss') openingLibrary[signature].losses++;
            else openingLibrary[signature].draws++;
        }

        function getOpeningScore(signature, color) {
            const opening = openingLibrary[signature];
            if (!opening || opening.timesPlayed < 2) return 0;
            
            const total = opening.wins + opening.losses + opening.draws;
            if (total < 2) return 0;
            
            const winRate = opening.wins / total;
            
            if (opening.color === color) {
                return (winRate - 0.5) * 50;
            } else {
                return ((1 - winRate) - 0.5) * 50;
            }
        }

        function adjustPieceValues(winnerColor) {
            const learningRate = 0.05;
            const baseValues = {...pieceValues};
            
            Object.keys(learnedPieceValues).forEach(piece => {
                if (winnerColor === 'black') {
                    learnedPieceValues[piece] = learnedPieceValues[piece] * (1 - learningRate * 0.5) + 
                                               baseValues[piece] * learningRate * 0.5;
                }
            });
            
            console.log('Adjusted piece values:', learnedPieceValues);
        }

        function onGameEnd(winner) {
            gamesPlayed++;
            
            let result = 'draw';
            if (winner === 'Brancas') result = winner === 'Brancas' && currentPlayer === 'white' ? 'loss' : 'win';
            else if (winner === 'Pretas') result = winner === 'Pretas' && currentPlayer === 'black' ? 'loss' : 'win';
            
            if (result === 'win') {
                gamesWon++;
                adjustPieceValues('black');
            } else if (result === 'loss') {
                gamesLost++;
                adjustPieceValues('white');
            }
            
            const moveSignatures = moveHistory.map(m => m.from.join('') + m.to.join(''));
            recordOpening('black', moveSignatures, result);
            
            recentGames.push({
                date: new Date().toISOString(),
                result: result,
                moves: moveSignatures.length,
                pieceValues: {...learnedPieceValues}
            });
            
            saveLearnedData();
            
            console.log(`Game ${gamesPlayed}: ${result} - Wins: ${gamesWon}, Losses: ${gamesLost}`);
        }

        function useLearnedKnowledge() {
            if (difficulty !== 'hard') return 0;
            if (!moveHistory || moveHistory.length === 0) return 0;
            
            const moveSignatures = moveHistory.map(m => {
                if (!m || !m.from || !m.to) return '';
                return m.from.join('') + m.to.join('');
            }).filter(s => s);
            
            if (moveSignatures.length < 2) return 0;
            
            const signature = getOpeningSignature(moveSignatures);
            
            return getOpeningScore(signature, 'black');
        }

        loadLearnedData();

        const pawntable = [
            [0,  0,  0,  0,  0,  0,  0,  0],
            [50, 50, 50, 50, 50, 50, 50, 50],
            [10, 10, 20, 30, 30, 20, 10, 10],
            [5,  5, 10, 25, 25, 10,  5,  5],
            [0,  0,  0, 20, 20,  0,  0,  0],
            [5, -5,-10,  0,  0,-10, -5,  5],
            [5, 10, 10,-20,-20, 10, 10,  5],
            [0,  0,  0,  0,  0,  0,  0,  0]
        ];

        const knighttable = [
            [-50,-40,-30,-30,-30,-30,-40,-50],
            [-40,-20,  0,  0,  0,  0,-20,-40],
            [-30,  0, 10, 15, 15, 10,  0,-30],
            [-30,  5, 15, 20, 20, 15,  5,-30],
            [-30,  0, 15, 20, 20, 15,  0,-30],
            [-30,  5, 10, 15, 15, 10,  5,-30],
            [-40,-20,  0,  5,  5,  0,-20,-40],
            [-50,-40,-30,-30,-30,-30,-40,-50]
        ];

        const bishopstable = [
            [-20,-10,-10,-10,-10,-10,-10,-20],
            [-10,  0,  0,  0,  0,  0,  0,-10],
            [-10,  0,  5, 10, 10,  5,  0,-10],
            [-10,  5,  5, 10, 10,  5,  5,-10],
            [-10,  0, 10, 10, 10, 10,  0,-10],
            [-10, 10, 10, 10, 10, 10, 10,-10],
            [-10,  5,  0,  0,  0,  0,  5,-10],
            [-20,-10,-10,-10,-10,-10,-10,-20]
        ];

        const rooktable = [
            [0,  0,  0,  0,  0,  0,  0,  0],
            [5, 10, 10, 10, 10, 10, 10,  5],
            [-5,  0,  0,  0,  0,  0,  0, -5],
            [-5,  0,  0,  0,  0,  0,  0, -5],
            [-5,  0,  0,  0,  0,  0,  0, -5],
            [-5,  0,  0,  0,  0,  0,  0, -5],
            [-5,  0,  0,  0,  0,  0,  0, -5],
            [0,  0,  0,  5,  5,  0,  0,  0]
        ];

        const queentable = [
            [-20,-10,-10, -5, -5,-10,-10,-20],
            [-10,  0,  0,  0,  0,  0,  0,-10],
            [-10,  0,  5,  5,  5,  5,  0,-10],
            [-5,  0,  5,  5,  5,  5,  0, -5],
            [0,  0,  5,  5,  5,  5,  0, -5],
            [-10,  5,  5,  5,  5,  5,  0,-10],
            [-10,  0,  5,  0,  0,  0,  0,-10],
            [-20,-10,-10, -5, -5,-10,-10,-20]
        ];

        const kingtable = [
            [-30,-40,-40,-50,-50,-40,-40,-30],
            [-30,-40,-40,-50,-50,-40,-40,-30],
            [-30,-40,-40,-50,-50,-40,-40,-30],
            [-30,-40,-40,-50,-50,-40,-40,-30],
            [-20,-30,-30,-40,-40,-30,-30,-20],
            [-10,-20,-20,-20,-20,-20,-20,-10],
            [20, 20,  0,  0,  0,  0, 20, 20],
            [20, 30, 10,  0,  0, 10, 30, 20]
        ];

        function hasOnlyPawns(b) {
            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    if (b[r][c] && b[r][c].type !== 'pawn') return false;
                }
            }
            return true;
        }

        function evaluateBoard(b, color) {
            if (!b || !Array.isArray(b)) return 0;
            
            const opponent = color === 'white' ? 'black' : 'white';
            
            if (hasOnlyPawns(b)) {
                return evaluatePawnEndgame(b, color);
            }
            
            let score = 0;
            
            const pieceCount = { white: 0, black: 0 };
            const attackUnits = { white: 0, black: 0 };
            let kingSafety = { white: 0, black: 0 };
            let pieceActivity = { white: 0, black: 0 };
            
            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    const piece = b[row][col];
                    if (!piece) continue;
                    
                    let value = learnedPieceValues[piece.type];
                    let bonus = 0;
                    
                    const pRow = piece.color === 'white' ? row : 7 - row;
                    
                    switch(piece.type) {
                        case 'pawn':
                            bonus = pawntable[pRow][col];
                            if (col === 0 || col === 7) bonus -= 10;
                            if (col === 1 || col === 6) bonus -= 5;
                            break;
                        case 'knight':
                            bonus = knighttable[pRow][col];
                            const isEdge = row === 0 || row === 7 || col === 0 || col === 7;
                            if (!isEdge && (row > 1 && row < 6) && (col > 1 && col < 6)) {
                                pieceActivity[piece.color] += 15;
                            }
                            break;
                        case 'bishop':
                            bonus = bishopstable[pRow][col];
                            break;
                        case 'rook':
                            bonus = rooktable[pRow][col];
                            if (col === 0 || col === 7) {
                                pieceActivity[piece.color] += 10;
                            }
                            break;
                        case 'queen':
                            bonus = queentable[pRow][col];
                            break;
                        case 'king':
                            bonus = kingtable[pRow][col];
                            break;
                    }
                    
                    value += bonus;
                    
                    if (piece.color === color) {
                        score += value;
                        pieceCount[color] += pieceValues[piece.type] / 100;
                        attackUnits[color] += getLegalMovesRaw(b, row, col).length;
                    } else {
                        score -= value;
                        pieceCount[opponent] += pieceValues[piece.type] / 100;
                        attackUnits[opponent] += getLegalMovesRaw(b, row, col).length;
                    }
                }
            }
            
            const myKingInCheck = isKingInCheckRaw(b, color);
            const oppKingInCheck = isKingInCheckRaw(b, opponent);
            
            if (myKingInCheck) {
                score -= 200;
                const kingPos = findKingPos(b, color);
                if (kingPos) {
                    const [kr, kc] = kingPos;
                    if (kr > 3) kingSafety[color] -= 30;
                    if (kc < 2 || kc > 5) kingSafety[color] -= 30;
                }
            }
            if (oppKingInCheck) {
                score += 200;
            }
            
            score += (attackUnits[color] - attackUnits[opponent]) * 8;
            score += pieceActivity[color] - pieceActivity[opponent];
            score += evaluatePawnStructure(b, color) - evaluatePawnStructure(b, opponent);
            score += evaluateSpace(b, color) - evaluateSpace(b, opponent);
            
            const myPieces = pieceCount[color];
            const oppPieces = pieceCount[opponent];
            if (myPieces < oppPieces - 2) {
                score -= 40;
            }
            
            const castlingValue = evaluateCastlingRights(b, color);
            const opponentCastlingValue = evaluateCastlingRights(b, opponent);
            score += (castlingValue - opponentCastlingValue) * 20;
            
            score += evaluateDevelopment(b, color) - evaluateDevelopment(b, opponent);
            
            if (difficulty === 'hard' && color === 'black') {
                score += useLearnedKnowledge();
            }
            
            if (pieceCount[color] < pieceCount[opponent] - 3) {
                score -= 30 * (pieceCount[opponent] - pieceCount[color]);
            }
            
            return score;
        }

        function evaluatePawnEndgame(b, color) {
            if (!b || !Array.isArray(b)) return 0;
            
            let score = 0;
            const opponent = color === 'white' ? 'black' : 'white';
            
            for (let col = 0; col < BOARD_SIZE; col++) {
                let whitePawnRow = -1, blackPawnRow = -1;
                for (let row = 7; row >= 0; row--) {
                    if (b[row][col] && b[row][col].type === 'pawn') {
                        if (b[row][col].color === 'white' && whitePawnRow === -1) {
                            whitePawnRow = row;
                        }
                        if (b[row][col].color === 'black' && blackPawnRow === -1) {
                            blackPawnRow = row;
                        }
                    }
                }
                if (whitePawnRow !== -1 && blackPawnRow !== -1 && Math.abs(whitePawnRow - blackPawnRow) === 1) {
                    const whiteDist = 7 - whitePawnRow;
                    const blackDist = blackPawnRow;
                    if (color === 'white') {
                        if (whiteDist <= blackDist) score += 20;
                        else score -= 20;
                    } else {
                        if (whiteDist >= blackDist) score -= 20;
                        else score += 20;
                    }
                }
            }
            
            return score;
        }

        function findKingPos(b, color) {
            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    if (b[r][c] && b[r][c].type === 'king' && b[r][c].color === color) {
                        return [r, c];
                    }
                }
            }
            return null;
        }

        function evaluateCastlingRights(b, color) {
            let value = 0;
            if (color === 'white') {
                if (b[7][4] && b[7][4].type === 'king') value += 1;
                if (b[7][7] && b[7][7].type === 'rook') value += 1;
                if (b[7][0] && b[7][0].type === 'rook') value += 1;
            } else {
                if (b[0][4] && b[0][4].type === 'king') value += 1;
                if (b[0][7] && b[0][7].type === 'rook') value += 1;
                if (b[0][0] && b[0][0].type === 'rook') value += 1;
            }
            return value;
        }

        function evaluateDevelopment(b, color) {
            let score = 0;
            const startRow = color === 'white' ? 7 : 0;
            
            if (b[startRow][1] && b[startRow][1].type === 'knight') score += 1;
            if (b[startRow][2] && b[startRow][2].type === 'bishop') score += 1;
            if (b[startRow][5] && b[startRow][5].type === 'bishop') score += 1;
            if (b[startRow][6] && b[startRow][6].type === 'knight') score += 1;
            
            return score;
        }

        function evaluatePawnStructure(b, color) {
            let score = 0;
            for (let col = 0; col < BOARD_SIZE; col++) {
                let pawnCount = { white: 0, black: 0 };
                
                for (let row = 0; row < BOARD_SIZE; row++) {
                    if (b[row][col] && b[row][col].type === 'pawn') {
                        const c = b[row][col].color;
                        pawnCount[c]++;
                        if (pawnCount[c] > 1) {
                            if (c === color) score -= 15;
                            else score += 15;
                        }
                    }
                }
            }
            
            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE - 1; col++) {
                    if (b[row][col] && b[row][col].type === 'pawn' && b[row][col].color === color) {
                        const adjCol = col - 1;
                        if (adjCol >= 0 && b[row][adjCol] && b[row][adjCol].type === 'pawn' && b[row][adjCol].color !== color) {
                            score -= 10;
                        }
                        const adjCol2 = col + 1;
                        if (adjCol2 < BOARD_SIZE && b[row][adjCol2] && b[row][adjCol2].type === 'pawn' && b[row][adjCol2].color !== color) {
                            score -= 10;
                        }
                    }
                }
            }
            
            return score;
        }

        function evaluateSpace(b, color) {
            let score = 0;
            const startRow = color === 'white' ? 4 : 3;
            const endRow = color === 'white' ? 7 : 5;
            
            for (let row = startRow; row < endRow; row++) {
                for (let col = 2; col < 6; col++) {
                    if (b[row][col] && b[row][col].color === color) score += 1;
                }
            }
            
            return score;
        }

        function getAllLegalMoves(b, color) {
            if (!b || !Array.isArray(b)) return [];
            
            const moves = [];
            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    const piece = b[row][col];
                    if (piece && piece.color === color) {
                        const legalMoves = getLegalMovesRaw(b, row, col);
                        legalMoves.forEach(move => moves.push({from: [row, col], to: move}));
                    }
                }
            }
            return moves;
        }

        function getLegalMovesRaw(b, row, col) {
            if (!b || !Array.isArray(b) || !b[row]) return [];
            
            const piece = b[row][col];
            if (!piece) return [];
            
            const color = piece.color;
            const moves = [];
            
            switch(piece.type) {
                case 'pawn':
                    moves.push(...getPawnMovesRaw(b, row, col, color));
                    break;
                case 'rook':
                    moves.push(...getRookMoves(row, col, color, b));
                    break;
                case 'knight':
                    moves.push(...getKnightMoves(row, col, color, b));
                    break;
                case 'bishop':
                    moves.push(...getBishopMoves(row, col, color, b));
                    break;
                case 'queen':
                    moves.push(...getQueenMoves(row, col, color, b));
                    break;
                case 'king':
                    moves.push(...getKingMoves(row, col, color, b));
                    break;
            }
            
            const validMoves = moves.filter(([r, c]) => r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE);
            
            return validMoves.filter(([r, c]) => {
                const tempBoard = b.map(rr => rr.map(cc => cc ? {...cc} : null));
                tempBoard[r][c] = tempBoard[row][col];
                tempBoard[row][col] = null;
                return !isKingInCheckRaw(tempBoard, color);
            });
        }

        function getPawnMovesRaw(b, row, col, color) {
            const moves = [];
            const direction = color === 'white' ? -1 : 1;
            const startRow = color === 'white' ? 6 : 1;

            const forward = row + direction;
            if (forward >= 0 && forward < BOARD_SIZE && b[forward] && !b[forward][col]) {
                moves.push([forward, col]);
                if (row === startRow) {
                    const doubleForward = forward + direction;
                    if (b[doubleForward] && !b[doubleForward][col]) {
                        moves.push([doubleForward, col]);
                    }
                }
            }

            const captureLeft = [row + direction, col - 1];
            if (captureLeft[1] >= 0 && captureLeft[0] >= 0 && captureLeft[0] < BOARD_SIZE) {
                const targetPiece = b[captureLeft[0]]?.[captureLeft[1]];
                if (targetPiece && targetPiece.color !== color) {
                    moves.push([captureLeft[0], captureLeft[1]]);
                }
            }

            const captureRight = [row + direction, col + 1];
            if (captureRight[1] < BOARD_SIZE && captureRight[0] >= 0 && captureRight[0] < BOARD_SIZE) {
                const targetPiece = b[captureRight[0]]?.[captureRight[1]];
                if (targetPiece && targetPiece.color !== color) {
                    moves.push([captureRight[0], captureRight[1]]);
                }
            }

            return moves;
        }

        function isKingInCheckRaw(b, color) {
            if (!b || !Array.isArray(b)) return false;
            
            let kingRow, kingCol;
            
            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    const piece = b[r][c];
                    if (piece && piece.type === 'king' && piece.color === color) {
                        kingRow = r;
                        kingCol = c;
                        break;
                    }
                }
            }
            
            if (kingRow === undefined) return false;
            
            const opponent = color === 'white' ? 'black' : 'white';
            
            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    const piece = b[r][c];
                    if (piece && piece.color === opponent) {
                        const moves = getAttackingMoves(b, r, c);
                        if (moves.some(m => m[0] === kingRow && m[1] === kingCol)) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }

        function getAttackingMoves(b, row, col) {
            const piece = b[row][col];
            if (!piece) return [];
            
            const color = piece.color;
            const moves = [];
            
            switch(piece.type) {
                case 'pawn':
                    const dir = piece.color === 'white' ? -1 : 1;
                    if (row + dir >= 0 && row + dir < BOARD_SIZE) {
                        if (col - 1 >= 0) moves.push([row + dir, col - 1]);
                        if (col + 1 < BOARD_SIZE) moves.push([row + dir, col + 1]);
                    }
                    break;
                case 'knight': moves.push(...getKnightMoves(row, col, color, b)); break;
                case 'bishop': moves.push(...getBishopMoves(row, col, color, b)); break;
                case 'rook': moves.push(...getRookMoves(row, col, color, b)); break;
                case 'queen': moves.push(...getQueenMoves(row, col, color, b)); break;
                case 'king': moves.push(...getKingMoves(row, col, color, b)); break;
            }
            
            return moves.filter(([r, c]) => r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE);
        }

        function makeMove(b, from, to) {
            if (!b || !Array.isArray(b)) {
                console.error('makeMove called with invalid board:', b);
                return null;
            }
            const newBoard = b.map(r => r.map(c => c ? {...c} : null));
            const piece = newBoard[from[0]][from[1]];
            newBoard[to[0]][to[1]] = piece;
            newBoard[from[0]][from[1]] = null;
            return newBoard;
        }

        const MATE_SCORE = 100000;
        const INFINITY = 1000000;

        function isInMate(b, color) {
            if (!b || !Array.isArray(b)) return false;
            
            const moves = getAllLegalMoves(b, color);
            if (moves.length === 0) {
                return isKingInCheckRaw(b, color);
            }
            return false;
        }

        function minimax(b, depth, alpha, beta, isMaximizing, color, depthFromRoot) {
            if (!b || !Array.isArray(b)) {
                return 0;
            }
            
            if (depth === 0) {
                return evaluateBoard(b, color);
            }
            
            const currentColor = isMaximizing ? color : (color === 'white' ? 'black' : 'white');
            const moves = getAllLegalMoves(b, currentColor);
            
            if (moves.length === 0) {
                if (isKingInCheckRaw(b, currentColor)) {
                    const sign = isMaximizing ? -1 : 1;
                    return sign * (MATE_SCORE - depthFromRoot * 100);
                }
                return 0;
            }
            
            if (isMaximizing) {
                let maxEval = -INFINITY;
                for (const move of moves) {
                    const newBoard = makeMove(b, move.from, move.to);
                    if (!newBoard) continue;
                    const evalScore = minimax(newBoard, depth - 1, alpha, beta, false, color, depthFromRoot + 1);
                    maxEval = Math.max(maxEval, evalScore);
                    alpha = Math.max(alpha, evalScore);
                    if (beta <= alpha) break;
                }
                return maxEval;
            } else {
                let minEval = INFINITY;
                for (const move of moves) {
                    const newBoard = makeMove(b, move.from, move.to);
                    if (!newBoard) continue;
                    const evalScore = minimax(newBoard, depth - 1, alpha, beta, true, color, depthFromRoot + 1);
                    minEval = Math.min(minEval, evalScore);
                    beta = Math.min(beta, evalScore);
                    if (beta <= alpha) break;
                }
                return minEval;
            }
        }

        function findBestMove(color, depth) {
            if (!board || !Array.isArray(board)) {
                console.error('Board is invalid:', board);
                return null;
            }
            const moves = getAllLegalMoves(board, color);
            
            if (moves.length === 0) return null;
            
            moves.sort((a, b) => {
                const captureA = board[a.to[0]][a.to[1]] ? pieceValues[board[a.to[0]][a.to[1]].type] : 0;
                const captureB = board[b.to[0]][b.to[1]] ? pieceValues[board[b.to[0]][b.to[1]].type] : 0;
                return captureB - captureA;
            });
            
            let bestMove = null;
            let bestValue = color === 'black' ? INFINITY : -INFINITY;
            
            for (const move of moves) {
                const newBoard = makeMove(board, move.from, move.to);
                if (!newBoard) continue;
                
                if (isInMate(newBoard, color === 'white' ? 'black' : 'white')) {
                    return move;
                }
                
                const boardValue = minimax(newBoard, depth - 1, -INFINITY, INFINITY, color === 'black', color, 1);
                
                if (color === 'black') {
                    if (boardValue < bestValue) {
                        bestValue = boardValue;
                        bestMove = move;
                    }
                } else {
                    if (boardValue > bestValue) {
                        bestValue = boardValue;
                        bestMove = move;
                    }
                }
            }
            
            return bestMove;
        }

        function makeAIMove() {
            console.log('makeAIMove called - gameActive:', gameActive, 'currentPlayer:', currentPlayer, 'difficulty:', difficulty);
            // BUG FIX #2: Guard against wrong turn; AI only plays as black in local mode
            if (!gameActive || currentPlayer !== 'black' || gameMode !== 'local') return;
            
            let depth;
            if (difficulty === 'easy') {
                depth = 1;
            } else if (difficulty === 'medium') {
                depth = 2;
            } else {
                depth = 3;
            }
            
            const startTime = Date.now();
            const bestMove = findBestMove('black', depth);
            const elapsed = Date.now() - startTime;
            console.log(`Difficulty: ${difficulty}, Depth: ${depth}, Time: ${elapsed}ms, BestMove:`, bestMove);
            
            if (bestMove) {
                const [fromRow, fromCol] = bestMove.from;
                const [toRow, toCol] = bestMove.to;
                movePiece(fromRow, fromCol, toRow, toCol);
            }
        }

        function undoMove() {
            if (moveHistory.length === 0 || !gameActive) return;
            
            const lastMove = moveHistory.pop();
            const [fromRow, fromCol] = lastMove.from;
            const [toRow, toCol] = lastMove.to;
            board[fromRow][fromCol] = lastMove.piece;
            board[toRow][toCol] = lastMove.capturedPiece;
            
            // BUG FIX #3: In local mode (vs AI) undo both the player's move and the AI's move.
            // Previously the condition was `gameMode === 'online'` which is inverted.
            if (gameMode === 'local' && moveHistory.length > 0) {
                const secondLastMove = moveHistory.pop();
                const [aiFromRow, aiFromCol] = secondLastMove.from;
                const [aiToRow, aiToCol] = secondLastMove.to;
                board[aiFromRow][aiFromCol] = secondLastMove.piece;
                board[aiToRow][aiToCol] = secondLastMove.capturedPiece;
                currentPlayer = secondLastMove.previousPlayer;
            } else {
                currentPlayer = lastMove.previousPlayer;
            }

            gameActive = true;
            document.getElementById('gameStatus').innerHTML = '';
            
            if (gameMode === 'online') {
                isMyTurn = currentPlayer === playerColor;
            }
            
            createBoard();
             // Não chama updateTurnIndicator() - função foi desabilitada
         }

        function findKing(color) {
            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    const piece = board[row][col];
                    if (piece && piece.type === 'king' && piece.color === color) {
                        return [row, col];
                    }
                }
            }
            return null;
        }

        function wouldLeaveKingInCheck(fromRow, fromCol, toRow, toCol, color) {
            const tempBoard = board.map(r => r.map(c => c ? {...c} : null));
            
            tempBoard[toRow][toCol] = tempBoard[fromRow][fromCol];
            tempBoard[fromRow][fromCol] = null;
            
            return isKingInCheckRaw(tempBoard, color);
        }

        function isValidMove(fromRow, fromCol, toRow, toCol) {
            const piece = board[fromRow][fromCol];
            if (!piece) return false;
            
            const moves = getPossibleMoves(fromRow, fromCol);
            const isBasicMove = moves.some(m => m[0] === toRow && m[1] === toCol);
            
            if (!isBasicMove) return false;
            
            return !wouldLeaveKingInCheck(fromRow, fromCol, toRow, toCol, piece.color);
        }

        function getLegalMoves(row, col) {
            const piece = board[row][col];
            if (!piece) return [];
            
            const moves = getPossibleMoves(row, col);
            return moves.filter(([r, c]) => isValidMove(row, col, r, c));
        }

        function isKingInCheck(color) {
            const kingPos = findKing(color);
            if (!kingPos) return false;
            const [kingRow, kingCol] = kingPos;
            const opponentColor = color === 'white' ? 'black' : 'white';
            
            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    const piece = board[row][col];
                    if (piece && piece.color === opponentColor) {
                        let moves = [];
                        switch(piece.type) {
                            case 'pawn':
                                const dir = piece.color === 'white' ? -1 : 1;
                                if (row + dir >= 0 && row + dir < BOARD_SIZE) {
                                    if (col - 1 >= 0) moves.push([row + dir, col - 1]);
                                    if (col + 1 < BOARD_SIZE) moves.push([row + dir, col + 1]);
                                }
                                break;
                            case 'knight': moves = getKnightMoves(row, col, piece.color); break;
                            case 'bishop': moves = getBishopMoves(row, col, piece.color); break;
                            case 'rook': moves = getRookMoves(row, col, piece.color); break;
                            case 'queen': moves = getQueenMoves(row, col, piece.color); break;
                            case 'king': moves = getKingMoves(row, col, piece.color); break;
                        }
                        if (moves.some(m => m[0] === kingRow && m[1] === kingCol)) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }

        function checkGameStatus() {
            const statusDiv = document.getElementById('gameStatus');
            const allMoves = [];
            const inCheck = isKingInCheck(currentPlayer);

            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    const piece = board[row][col];
                    if (piece && piece.color === currentPlayer) {
                        const moves = getLegalMoves(row, col);
                        allMoves.push(...moves);
                    }
                }
            }

            if (allMoves.length === 0) {
                const winner = currentPlayer === 'white' ? 'Pretas' : 'Brancas';
                const isMate = inCheck;
                
                if (winner === 'Brancas') {
                    whiteWins++;
                    document.getElementById('whiteScore').textContent = whiteWins;
                } else {
                    blackWins++;
                    document.getElementById('blackScore').textContent = blackWins;
                }
                
                if (gameMode === 'local' && difficulty === 'hard') {
                    onGameEnd(winner);
                }
                
                if (gameMode === 'online' && socket) {
                    socket.emit('updateScore', {
                        whiteWins: whiteWins,
                        blackWins: blackWins,
                        winner: winner
                    });
                }
                
                if (isMate) {
                    showVictory(winner);
                } else {
                    statusDiv.innerHTML = `<div class="game-over">Empate!</div>`;
                    gameActive = false;
                }
            } else if (inCheck) {
                statusDiv.innerHTML = `<div class="game-over">Xeque!</div>`;
            } else {
                statusDiv.innerHTML = '';
            }
        }

            blackWins = 0;
            document.getElementById('whiteScore').textContent = whiteWins;
            document.getElementById('blackScore').textContent = blackWins;
            
            if (gameMode === 'online' && socket) {

                });

        }

        function endGameByMaterial(winnerColor) {

                whiteWins++;
                document.getElementById('whiteScore').textContent = whiteWins;
            } else {
                blackWins++;
                document.getElementById('blackScore').textContent = blackWins;

            showVictory(winner);
        }

        function checkMaterialWin() {
            let whitePieces = 0;
            let blackPieces = 0;
            
            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    const piece = board[r][c];
                    if (piece) {
                        if (piece.color === 'white') {
                            whitePieces += pieceValues[piece.type];
                        } else {
                            blackPieces += pieceValues[piece.type];
                        }
                    }
                }
            }
            
            if (whitePieces > blackPieces + 300) {
                endGameByMaterial('white');
                return true;
            } else if (blackPieces > whitePieces + 300) {
                endGameByMaterial('black');
                return true;
            }
            
            return false;
        }

        function renderTournamentBracket(tournament) {
            if (tournament.status === 'completed') {
                return `
                    <div style="text-align: center; padding: 20px;">
                        <h2 style="color: #ffd700;">🏆 Vencedor: ${tournament.winner?.username || 'N/A'}</h2>
                        <p>Torneio Finalizado</p>
                    </div>
                `;
            }
            
            if (tournament.status === 'in_progress') {
                const rounds = [];
                const maxRound = tournament.totalRounds;
                
                for (let r = 1; r <= maxRound; r++) {
                    const roundMatches = tournament.matches.filter(m => m.round === r);
                    const roundName = getRoundName(r, maxRound);
                    
                    rounds.push(`
                        <div class="tournament-round">
                            <h4 style="text-align: center; color: #00ffff; margin: 10px 0;">${roundName}</h4>
                            ${roundMatches.map(match => renderMatch(match, tournament)).join('')}
                        </div>
                    `);
                }
                
                return `
                    <div style="overflow-x: auto;">
                        <div style="display: flex; gap: 20px; justify-content: center;">
                            ${rounds.join('')}
                        </div>
                    </div>
                    <button class="join-tournament-btn" onclick="showTournaments()" style="margin-top: 20px;">← Voltar</button>
                `;
            }
            
            // Torneio aberto - mostrar info de inscrição
            return `
                <div style="text-align: center;">
                    <p>Inscrições abertas!</p>
                    <p>Vagas: ${tournament.maxParticipants - (tournament.participants?.length || 0)}/${tournament.maxParticipants}</p>
                </div>
            `;
        }

        function getRoundName(round, totalRounds) {
            const names = {
                1: totalRounds === 4 ? 'Oitavas' : totalRounds === 3 ? 'Semifinal' : 'Rodada 1',
                2: totalRounds === 4 ? 'Quartas' : totalRounds === 3 ? 'Final' : 'Rodada 2',
                3: totalRounds === 4 ? 'Semifinal' : 'Rodada 3',
                4: 'Final'
            };
            return names[round] || `Rodada ${round}`;
        }

            return `
                <div class="tournament-match ${statusClass}" style="margin: 10px 0; padding: 10px; border: 1px solid #444; border-radius: 8px; ${isMyMatch ? 'border-color: #00ffff;' : ''}">

                        <span>${match.player2?.username || 'Aguardando'}</span>

        function getBetActions(bet) {
            const isChallenger = currentUser.id === bet.challenger.id;

            if (bet.status === 'pending' && isOpponent) {
                return `
                    <button class="join-tournament-btn" onclick="acceptBet('${bet.id}')">Aceitar Aposta</button>

                        'Authorization': `Bearer ${token}`

                    body: JSON.stringify({

                if (data.success) {

                }
            } catch (err) {
                console.error('Erro ao processar PIX:', err);
                alert('Erro ao processar pagamento PIX');
                pixBtn.disabled = false;
                cardBtn.disabled = false;
                pixBtn.classList.remove('selected');
                pixBtn.textContent = 'PIX';
            }
        }

        async function processCard() {
            if (!selectedTournament || !currentUser) {
                alert('Erro: Dados incompletos');
                return;
            }

            const pixBtn = document.getElementById('pixBtn');
            const cardBtn = document.getElementById('cardBtn');
            
            // Remove seleção anterior
            pixBtn.classList.remove('selected');
            cardBtn.classList.remove('selected');
            
            // Marca Cartão como selecionado
            cardBtn.classList.add('selected');
            selectedPaymentMethod = 'card';

            cardBtn.disabled = true;
            pixBtn.disabled = true;
            cardBtn.textContent = 'Processando Cartão...';

            try {
                const response = await fetch('/api/create-payment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        tournamentId: selectedTournament.id,
                        userId: currentUser.id,
                        username: currentUser.username,
                        amount: selectedTournament.entryFee,
                        description: selectedTournament.name,
                        paymentMethod: 'card'
                    })
                });

                const data = await response.json();

                if (data.success && data.initPoint) {
                    console.log('Cartão criado com sucesso:', data.preferenceId);
                    console.log('Detalhes - Valor: R$ ' + data.amount + ' | Banca: R$ ' + data.houseFee + ' | Jogadores: R$ ' + data.playerAmount);
                    // Redireciona para o Mercado Pago
                    window.location.href = data.initPoint;
                } else {
                    alert('Erro ao gerar link de pagamento: ' + (data.error || 'Erro desconhecido'));
                    cardBtn.disabled = false;
                    pixBtn.disabled = false;
                    cardBtn.classList.remove('selected');
                    cardBtn.textContent = 'Cartão';
                }
            } catch (err) {
                console.error('Erro ao processar cartão:', err);
                alert('Erro ao processar pagamento com cartão');
                cardBtn.disabled = false;
                pixBtn.disabled = false;
                cardBtn.classList.remove('selected');
                cardBtn.textContent = 'Cartão';
            }
        }

         board = createInitialBoard();
         createBoard();
         // updateTurnIndicator() - função foi desabilitada
     </script>
 </body>
